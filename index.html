<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASTEROIDS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-overlay">
      <div id="score">0</div>
      <div id="lives"></div>
      <div id="level"></div>
    </div>
    <div id="start-screen" class="screen">
      <h1>ASTEROIDS</h1>
      <p class="subtitle">1979 ATARI CLASSIC</p>
      <div class="controls-info">
        <p>↑ or W — THRUST</p>
        <p>← → or A D — ROTATE</p>
        <p>SPACE — FIRE</p>
      </div>
      <p class="blink">PRESS ENTER TO START</p>
    </div>
    <div id="game-over-screen" class="screen hidden">
      <h1>GAME OVER</h1>
      <p id="final-score"></p>
      <p id="high-score"></p>
      <p class="blink">PRESS ENTER TO PLAY AGAIN</p>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
